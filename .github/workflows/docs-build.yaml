name: Docs Build
# Build-only check on PRs that touch the docs site, so MDX errors (and broken
# generation) fail at PR time, never at release deploy. No publish.
on:
  pull_request:
    paths:
      - 'website/**'
      - 'docs/**'
      - 'CHANGELOG.md'
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true
jobs:
  build:
    name: 🏗️ Build docs
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      - name: 🐹 Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "stable"
      - name: 🟢 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: website/package-lock.json
      - name: 📦 Install dependencies
        working-directory: website
        run: npm ci
      - name: 🏗️ Build
        working-directory: website
        run: npm run build

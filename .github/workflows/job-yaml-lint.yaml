name: YamlLint
on:
  push:
    paths-ignore:
      - '**.md'
  pull_request:
    branches:
      - main
permissions:
  contents: read
jobs:
  lint:
    name: YamlLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v6
      - name: YamlLint
        run: |
          pip install yamllint
          yamllint .

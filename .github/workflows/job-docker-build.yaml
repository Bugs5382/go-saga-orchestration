name: Docker Build
# Validate the image build and chart on PRs: build both services (no push,
# amd64 only for speed) and lint/render the Helm chart.
on:
  pull_request:
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'go.mod'
      - 'go.sum'
      - 'Dockerfile'
      - 'chart/**'
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true
jobs:
  build-images:
    name: 🐳 Build images
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [api, engine]
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      - name: 🔧 Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: 🐳 Build ${{ matrix.service }} (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          build-args: SERVICE=${{ matrix.service }}
          platforms: linux/amd64
          push: false
  lint-chart:
    name: ⎈ Lint chart
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      - name: ⎈ Set up Helm
        uses: azure/setup-helm@v4
      - name: ⎈ Lint
        run: helm lint chart/
      - name: ⎈ Render
        run: helm template go-saga chart/ -f chart/ci/default-values.yaml > /dev/null

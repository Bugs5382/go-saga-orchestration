# Image coordinates. tag defaults to the chart appVersion (stamped to the release
# version at package time); override to pin a specific published tag.
image:
  registry: ghcr.io
  api:
    repository: bugs5382/go-saga-orchestration/api
  engine:
    repository: bugs5382/go-saga-orchestration/engine
  tag: ""            # "" -> .Chart.AppVersion
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""
  annotations: {}

# Datastore selection. type -> STORE_TYPE.
#   postgres (default) | redis | valkey | memory (single-process, dev only)
store:
  type: postgres
  redisRunTTL: "0s"   # REDIS_RUN_TTL (redis/valkey)

# Both the api and the engine require a reachable RabbitMQ AND a store. Supply
# the connection strings through a Secret and reference it here. Only the keys
# your setup needs must exist (referenced with optional: true):
#   database-dsn -> DATABASE_DSN  (postgres store)
#   redis-url    -> REDIS_URL     (redis/valkey store)
#   rabbitmq-url -> RABBITMQ_URL  (REQUIRED by both services)
# Never put a real connection string in values; create the Secret out of band.
connectionSecret: ""
connectionSecretKeys:
  databaseDsn: database-dsn
  redisUrl: redis-url
  rabbitmqUrl: rabbitmq-url

api:
  replicas: 1
  port: 8080
  updateStrategy:
    type: RollingUpdate
  resources: {}
  livenessProbe:
    httpGet:
      path: /health/live
      port: http
    initialDelaySeconds: 5
    periodSeconds: 10
  readinessProbe:
    httpGet:
      path: /health/ready
      port: http
    initialDelaySeconds: 5
    periodSeconds: 10
  service:
    type: ClusterIP

engine:
  replicas: 1
  grpcPort: 9090
  updateStrategy:
    type: RollingUpdate
  resources: {}
  # No standard grpc.health.v1 service yet, so probe the listener via TCP.
  livenessProbe:
    tcpSocket:
      port: grpc
    initialDelaySeconds: 5
    periodSeconds: 10
  readinessProbe:
    tcpSocket:
      port: grpc
    initialDelaySeconds: 5
    periodSeconds: 10
  service:
    type: ClusterIP

# Cron dispatcher topology (issue #69). Cron firing is exactly-once across all
# engine pods via the ClaimCronFire CAS, so isolating cron onto its own pod is an
# operational choice, not a correctness requirement. This single switch controls
# the whole topology:
#
#   dedicated: false (default) -> no extra pod; the cron dispatcher runs on every
#     main engine pod (CAS keeps firing single-shot). Simplest single-deployment
#     setup.
#   dedicated: true -> add one dedicated single-replica cron pod that runs the
#     dispatcher, and turn the dispatcher OFF on every (scaled) main engine pod.
#     One obvious cron writer alongside many saga-processing replicas. The cron
#     pod reuses the engine image, config, and connection secret.
#
# There is no separate per-engine cron flag: enabling the dedicated pod is what
# disables cron on the main engines. The WORKFLOW_CRON_DISPATCHER env the binary
# reads is derived from this switch by the chart.
cron:
  dedicated: false
  replicas: 1
  resources: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  host: ""
  tls: []

podAnnotations: {}
podSecurityContext:
  runAsNonRoot: true
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: [ALL]

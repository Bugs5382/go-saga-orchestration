{{- if .Values.cron.dedicated }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gosaga.fullname" . }}-cron
  labels:
    {{- include "gosaga.labels" . | nindent 4 }}
    app.kubernetes.io/component: cron
spec:
  # Single dedicated cron writer. Recreate avoids two cron pods overlapping
  # during a rollout; the ClaimCronFire CAS keeps firing exactly-once regardless,
  # so cron.replicas may be raised for availability if desired (issue #69).
  replicas: {{ .Values.cron.replicas }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "gosaga.selectorLabels" (merge (dict "component" "cron") .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "gosaga.selectorLabels" (merge (dict "component" "cron") .) | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "gosaga.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: cron
          image: "{{ .Values.image.registry }}/{{ .Values.image.engine.repository }}:{{ include "gosaga.imageTag" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: grpc
              containerPort: {{ .Values.engine.grpcPort }}
          envFrom:
            - configMapRef:
                name: {{ include "gosaga.fullname" . }}-config
          env:
            # The dedicated cron pod is the one engine process that runs the
            # cron dispatcher loop (issue #69).
            - name: WORKFLOW_CRON_DISPATCHER
              value: "true"
            {{- if .Values.connectionSecret }}
            {{- include "gosaga.connEnv" . | nindent 12 }}
            {{- end }}
          livenessProbe:
            {{- toYaml .Values.engine.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.engine.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.cron.resources | nindent 12 }}
{{- end }}

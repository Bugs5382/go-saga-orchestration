apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gosaga.fullname" . }}-api
  labels:
    {{- include "gosaga.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicas }}
  strategy:
    {{- toYaml .Values.api.updateStrategy | nindent 4 }}
  selector:
    matchLabels:
      {{- include "gosaga.selectorLabels" (merge (dict "component" "api") .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "gosaga.selectorLabels" (merge (dict "component" "api") .) | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "gosaga.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: api
          image: "{{ .Values.image.registry }}/{{ .Values.image.api.repository }}:{{ include "gosaga.imageTag" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.api.port }}
          envFrom:
            - configMapRef:
                name: {{ include "gosaga.fullname" . }}-config
          {{- if .Values.connectionSecret }}
          env:
            {{- include "gosaga.connEnv" . | nindent 12 }}
          {{- end }}
          livenessProbe:
            {{- toYaml .Values.api.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.api.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
